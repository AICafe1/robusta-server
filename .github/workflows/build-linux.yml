name: build-linux

on:
  workflow_dispatch:

env:
  CFLAGS: "-march=x86-64-v3"
  CXXFLAGS: "-march=x86-64-v3"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: robusta
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta
          token: ${{ secrets.PASS }}
          ref: build24

      - name: data
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta-data
          token: ${{ secrets.PASS }}
          path: data

      - name: src
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta-src
          token: ${{ secrets.PASS }}
          path: src

      - name: Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm i
      - run: cd data; npm i

      - run: npm run b-lnx
      - run: cd data; npm run b-lnx

      - run: node src/license/private.ts --year=1 LICENSE.key
      - run: bin/robusta abi.js
      - run: bin/robusta --mode=manage
      - run: ls -l robusta.sqlite
      - run: |
          mv bin/robusta .
          mv data/bin/rdata .
          chmod +x robusta rdata
          zstd -19 robusta
          zstd -19 rdata
          tar -czvf robusta-linux.tgz robusta
          tar -czvf rdata-linux.tgz rdata

      - uses: actions/upload-artifact@v4
        with:
          name: robusta
          path: robusta

      - uses: actions/upload-artifact@v4
        with:
          name: rdata
          path: rdata

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.zst
            *.tgz
