name: Intraday Data

on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: VSCode
        default: false

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: data
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta-data
          token: ${{ secrets.PASS }}
          path: data

      - name: Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: mkdir csv; cd data; npm install

      - name: VSCode
        if: ${{ inputs.debug == true }}
        env:
          DNSE_KEY: ${{ secrets.DNSE_KEY }}
          DNSE_SEC: ${{ secrets.DNSE_SEC }}
          ZIP: ${{ secrets.ZIP }}
        uses: fawazahmed0/action-debug-vscode@main
