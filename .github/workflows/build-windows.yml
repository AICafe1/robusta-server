name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: robusta
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta
          token: ${{ secrets.PASS }}
          ref: build24

      - name: data
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta-data
          token: ${{ secrets.PASS }}
          path: data

      - name: src
        uses: actions/checkout@v6
        with:
          repository: AICafe1/robusta-src
          token: ${{ secrets.PASS }}
          path: src

      - name: Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: fawazahmed0/action-debug-vscode@main
